<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoiceCast Desktop</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0D0D14;
      color: #FFFFFF;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }

    .card {
      width: 420px;
      background: #14141E;
      border: 1px solid #1E1E2E;
      border-radius: 16px;
      padding: 36px 32px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, #FF2D55, #FF6B6B);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .subtitle {
      color: #8E8EA0;
      font-size: 13px;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #8E8EA0;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid #2A2A3E;
      background: #0D0D14;
      color: #FFF;
      font-size: 14px;
      outline: none;
      margin-bottom: 18px;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #FF2D55; }
    input::placeholder { color: #4A4A5E; }

    button {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #FF2D55, #FF6B6B);
      color: #FFF;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }

    .status-bar {
      margin-top: 20px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-bar.connected {
      background: rgba(0, 214, 143, 0.08);
      border: 1px solid rgba(0, 214, 143, 0.2);
      color: #00D68F;
    }

    .status-bar.disconnected {
      background: rgba(255, 45, 85, 0.08);
      border: 1px solid rgba(255, 45, 85, 0.2);
      color: #FF2D55;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: #4A4A5E;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">🔊</div>
      <div>
        <h1>VoiceCast Desktop</h1>
      </div>
    </div>
    <p class="subtitle">Enter your name and the VoiceCast server URL to start receiving voice messages.</p>

    <label>Your Name</label>
    <input id="nameInput" type="text" placeholder="e.g. John Smith" autocomplete="off" />

    <label>Server URL</label>
    <input id="serverInput" type="text" placeholder="https://your-app.replit.app" autocomplete="off" />

    <button id="connectBtn">Connect & Minimize to Tray</button>

    <div id="statusBar" class="status-bar disconnected">
      <div class="dot"></div>
      <span id="statusText">Not connected</span>
    </div>

    <p class="hint">After connecting, this window minimizes to the system tray.<br />Right-click the tray icon to access settings or quit.</p>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
